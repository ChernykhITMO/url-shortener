env: local
service:
  max_attempts: 20
  alias_length: 10
http_server:
  read_timeout: 5s
  read_header_timeout: 2s
  write_timeout: 10s
  idle_timeout: 60s
  shutdown_timeout: 5s
  max_body_bytes: 1024
postgres:
  dsn: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
  max_open_conns: 5
  max_idle_conns: 5
  conn_max_lifetime: 1h
